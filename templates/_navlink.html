<a href="{% if url %}{% url url %}{% else %}{{ href }}{% endif %}"
   class="flex items-center gap-3 px-3 py-2 rounded-lg font-medium no-underline {% if on == key %}bg-primary-50 text-primary-700{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
  <i class="fas {{ icon }} w-4 text-center"></i><span>{{ label }}</span>
</a>
