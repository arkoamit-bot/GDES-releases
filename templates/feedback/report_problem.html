{% extends "base.html" %}{% load static %}
{% block title %}Report Problem — GDES{% endblock %}
{% block heading %}Report a Problem{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
  <form method="post" class="form-card">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Category</label>
      <select name="feedback_type" class="form-control" required>
        <option value="software_bug">Software Bug</option>
        <option value="incorrect_recommendation">Incorrect Recommendation</option>
        <option value="missing_guideline">Missing Guideline</option>
        <option value="workflow_issue">Workflow Issue</option>
        <option value="ui_issue">UI Issue</option>
        <option value="suggestion">Suggestion</option>
        <option value="feature_request">Feature Request</option>
        <option value="clinical_concern">Clinical Concern</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" name="title" class="form-control" required maxlength="200">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="5"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Page URL (optional)</label>
      <input type="text" name="page_url" class="form-control" value="{{ request.get_full_path }}">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Submit Report</button>
      <a href="{% url 'feedback:feedback_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
