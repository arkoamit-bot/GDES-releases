name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
          pip install pytest pytest-django django-stubs

      - name: Ruff check
        run: ruff check .

      - name: Mypy type check
        run: mypy --ignore-missing-imports bgddr/
        continue-on-error: true  # Soft enforcement while type hints are incomplete

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django coverage

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: bgddr.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "1"
        run: |
          coverage run --source='.' -m pytest tests/ feedback/tests.py -v
          coverage report -m
          coverage html -d coverage_html

      - name: Check for pending migrations
        env:
          DJANGO_SETTINGS_MODULE: bgddr.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "1"
        run: python manage.py makemigrations --check --dry-run

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 30
