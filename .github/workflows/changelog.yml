name: Changelog

on:
  push:
    branches: [main]

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update CHANGELOG
        run: |
          # Get last tag or use first commit
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          # Generate changelog section
          {
            echo "# Changelog"
            echo ""
            echo "## Latest Changes ($(date +%Y-%m-%d))"
            echo ""
            git log --oneline --no-merges ${LAST_TAG}..HEAD 2>/dev/null | head -30 || git log --oneline -20
            echo ""
            echo "---"
            echo ""
            # Prepend to existing changelog if it exists
            if [ -f "CHANGELOG.md" ]; then
              cat CHANGELOG.md
            fi
          } > CHANGELOG_NEW.md

          mv CHANGELOG_NEW.md CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog [skip ci]"
          git push
